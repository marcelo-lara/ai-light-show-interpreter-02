services:
  light-show-cli:
    build: .
    tty: true
    stdin_open: true
    working_dir: /app
    volumes:
      - .:/app:ro
      - ./data:/app/data:ro
      - ./data/shows:/app/data/shows:rw
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - PYTEST_ADDOPTS=-o cache_dir=/tmp/pytest-cache
    command: []
